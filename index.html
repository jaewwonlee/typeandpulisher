<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span>TYPE AND PUBLISHER</span>
        <span>타입앤드퍼블리셔</span>
    </header>

    <main class="container">
        <div class="error noto-sans-kr-regular" id="error-face">\(o_o)/</div>
        <div class="sorry">
            <span>Under Constructure ...</span>
            <span>제작 중이에요!</span>
        </div>
    </main>
    
    <address>
        <p>
            <span>TAP</span>
            <span>|</span>
            <a href="mailto:typeandpublisher@gmail.com">Email</a>
            <a href="https://www.instagram.com/typeandpublisher" target="_blank">Instagram</a>
        </p>
    </address>

    <script>
        const faces = ["\\(o_o)/", "(^_^;)", "(￣▽￣;)", "(；´∀｀)"];
        const errorFace = document.querySelector("#error-face");

        errorFace.textContent = faces[Math.floor(Math.random() * faces.length)];
    </script>

</body>
</html>
